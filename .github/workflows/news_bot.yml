name: News Bot

on:
  # Запускать автоматически каждый день в 07:00 UTC (= 10:00 МСК)
  schedule:
    - cron: '0 7 * * *'
  # Разрешить запуск вручную из интерфейса GitHub Actions
  workflow_dispatch:

jobs:
  run-news-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Нужен токен с правом push для сохранения message_ids.json
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # Настройка git для коммита message_ids.json
      - name: Configure git
        run: |
          git config user.email "bot@github.com"
          git config user.name "News Bot"

      # Подтягиваем последние изменения (включая message_ids.json от прошлого запуска)
      - name: Pull latest changes
        run: git pull origin main || true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install \
            requests \
            Pillow \
            lxml \
            beautifulsoup4 \
            deep-translator \
            python-telegram-bot

      # Восстанавливаем кэш опубликованных новостей между запусками
      - name: Restore published news cache
        uses: actions/cache@v3
        with:
          path: output/published_news.json
          key: news-cache-${{ github.run_id }}
          restore-keys: |
            news-cache-

      # Создаём директорию output заранее
      - name: Prepare output directory
        run: mkdir -p output/images

      - name: Run news bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      # Сохраняем message_ids.json в репозиторий через git push
      # Это гарантирует персистентность между запусками (в отличие от actions/cache)
      - name: Save message ids to repository
        run: |
          git add output/message_ids.json || true
          git diff --staged --quiet || git commit -m "chore: update message ids [skip ci]"
          git push || true

      # Сохраняем кэш опубликованных новостей для следующего запуска
      - name: Save published news cache
        uses: actions/cache@v3
        with:
          path: output/published_news.json
          key: news-cache-${{ github.run_id }}
